# (it appears on next page load — no redeploy) and give it a `section`.
#
# `rss_feeds` entries are fetched, merged and de-duplicated by URL. Each feed names
# the section its items land under (e.g. the Medium blog → "Personal Blog"), so new
# posts show up automatically.

# Display order of the section subheadings (any section not listed is appended A→Z).
